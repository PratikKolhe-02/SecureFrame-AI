

services:
  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    restart: always

  node-backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: always
    depends_on:
      - ai-service

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    env_file:
      - ./frontend/.env
    restart: always
    depends_on:
      - node-backend